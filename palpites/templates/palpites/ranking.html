{% extends 'base.html' %}

{% block content %}

<h1 class="text-center">Ranking</h1>

<table class="table">

    <thead>
        <tr>
            <th>#</th>
            <th>Usuário</th>
            <th>Pontos</th>
        </tr>
    </thead>

    <tbody>

        {% for usuario in ranking %}

        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.total_pontos|default:0 }}</td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
